spec_version: 1
name: my_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "Cold-Chain Dispatch Simulator: Deliver perishable cargo with deterministic heat/traffic pulses, compressor wear, repair-hub trade-offs, and trajectory-level grading signals in [0.0, 1.0]."
version: 1.0.0
tasks:
  - id: cold_chain_easy
    description: "Short route with mild pulses. Learn stable cruising bands and avoid unnecessary route switching."
  - id: cold_chain_medium
    description: "Hot corridor with partial compressor wear. Strategic one-time repair-hub use can improve final score."
  - id: cold_chain_hard
    description: "Long high-heat route with heavy traffic waves and strict deadline pressure. Tests long-horizon planning discipline."
  - id: cold_chain_vaccine_urgent
    description: "Medical-priority lane with tight delivery deadline and low excursion tolerance. Tests schedule-critical planning."
  - id: cold_chain_grid_outage
    description: "Infrastructure stress scenario with outage-like heat spikes and degraded refrigeration. Tests recovery strategy under compliance pressure."